name: CI Backend (Python)

on:
  push:
    branches: [main, develop]
    paths: ['apps/api/**', '.github/workflows/ci-backend.yml']
  pull_request:
    paths: ['apps/api/**', '.github/workflows/ci-backend.yml']

defaults:
  run:
    working-directory: apps/api

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: linko
          POSTGRES_PASSWORD: linko
          POSTGRES_DB: linko_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U linko -d linko_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.10.8'

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Run migrations
        env:
          ALEMBIC_DATABASE_URL: postgresql+psycopg://linko:linko@localhost:5432/linko_test
        run: uv run alembic upgrade head

      - name: Pytest
        env:
          DATABASE_URL: postgresql+asyncpg://linko:linko@localhost:5432/linko_test
          ALEMBIC_DATABASE_URL: postgresql+psycopg://linko:linko@localhost:5432/linko_test
          TEST_DATABASE_URL: postgresql+asyncpg://linko:linko@localhost:5432/linko_test
        run: uv run pytest -q
